name: ESLint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Run ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - run: ls -lha
      - run: npm ci

      # Use the default 'stylish' format so the problem matcher can read it
      - name: Run ESLint
        run: npx eslint . --format stylish
